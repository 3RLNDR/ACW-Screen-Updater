<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ACW Screen Test Output</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="fullscreen-body" data-display-mode="preview">
  <div id="keepAlivePulse" hidden aria-hidden="true"></div>
  <video
    id="keepAliveVideo"
    autoplay
    muted
    loop
    playsinline
    preload="auto"
    aria-hidden="true"
    style="position:fixed;left:0;top:0;width:1px;height:1px;opacity:0.01;pointer-events:none;z-index:-1;"
  ></video>
  <main class="fullscreen-screen">
    <section class="fullscreen-stage">
      <div class="fullscreen-media">
        <img id="slideImage" class="fullscreen-image" alt="" hidden>
        <div id="slidePoster" class="fullscreen-poster"></div>
        <div id="slideCategory" class="fullscreen-category"></div>
      </div>

      <div class="fullscreen-content">
        <div class="fullscreen-topline">
          <span class="fullscreen-venue">Arts Centre Washington</span>
          <span id="slideCounter" class="fullscreen-counter">1 / 1</span>
        </div>

        <div class="fullscreen-copy">
          <div id="slideAvailability" class="fullscreen-availability" hidden></div>
          <h1 id="slideTitle" class="fullscreen-title">Loading events</h1>
          <p id="slideDate" class="fullscreen-date">Please wait while the display loads.</p>
          <p id="slideDateNote" class="fullscreen-date-note" hidden></p>
          <div id="slideDetails" class="fullscreen-details"></div>
          <div id="slideQrPanel" class="fullscreen-qr-panel" data-qr-status="hidden" hidden>
            <img id="slideQrImage" class="fullscreen-qr-image" alt="" hidden>
            <div class="fullscreen-qr-copy">
              <strong class="fullscreen-label">Scan for details</strong>
              <a
                id="slideQrLink"
                class="fullscreen-qr-link"
                href="#"
                target="_blank"
                rel="noreferrer"
              ></a>
            </div>
          </div>
        </div>

        <div id="slideProgress" class="fullscreen-progress" aria-hidden="true">
          <div id="slideProgressBar" class="fullscreen-progress-bar"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="./fullscreen.js"></script>
</body>
</html>
