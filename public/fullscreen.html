<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Arts Centre Washington Fullscreen</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="fullscreen-body">
  <div id="keepAlivePulse" hidden aria-hidden="true"></div>
  <main class="fullscreen-screen">
    <section class="fullscreen-stage">
      <div class="fullscreen-media">
        <img id="slideImage" class="fullscreen-image" alt="" hidden>
        <div id="slidePoster" class="fullscreen-poster"></div>
        <div id="slideCategory" class="fullscreen-category"></div>
      </div>

      <div class="fullscreen-content">
        <div class="fullscreen-topline">
          <span class="fullscreen-venue">Arts Centre Washington</span>
          <span id="slideCounter" class="fullscreen-counter">1 / 1</span>
        </div>

        <div class="fullscreen-copy">
          <div id="slideAvailability" class="fullscreen-availability" hidden></div>
          <h1 id="slideTitle" class="fullscreen-title">Loading events</h1>
          <p id="slideDate" class="fullscreen-date">Please wait while the display loads.</p>
          <div id="slideDetails" class="fullscreen-details"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="./fullscreen.js"></script>
</body>
</html>
